---
# Deploy the cryovial container to a kind cluster via laconic-so.
#
# Expects prerequisites role to have run first (Docker, kind, kubectl,
# laconic-so all installed, kind cluster running).

- name: Create stack directory
  ansible.builtin.file:
    path: "{{ cryovial_stack_dir }}"
    state: directory
    mode: "0755"

- name: Copy stack files
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../stacks/cryovial/"
    dest: "{{ cryovial_stack_dir }}/"
    delete: true
    rsync_opts:
      - "--exclude=.git"

- name: Pull cryovial image
  ansible.builtin.command: "docker pull {{ cryovial_image }}"
  register: cryovial_pull_result
  changed_when: "'Downloaded newer image' in cryovial_pull_result.stdout or 'Pull complete' in cryovial_pull_result.stdout"

- name: Load cryovial image into kind
  ansible.builtin.command: "kind load docker-image {{ cryovial_image }} --name {{ prerequisites_kind_cluster_name }}"
  changed_when: true

- name: Apply RBAC
  ansible.builtin.command: "kubectl apply -f {{ cryovial_stack_dir }}/rbac.yml"
  register: cryovial_rbac_result
  changed_when: "'created' in cryovial_rbac_result.stdout or 'configured' in cryovial_rbac_result.stdout"

- name: Create cryovial namespace
  ansible.builtin.command: "kubectl apply -f -"
  args:
    stdin: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: laconic-cryovial
        labels:
          app: cryovial
  register: cryovial_ns_result
  changed_when: "'created' in cryovial_ns_result.stdout"

- name: Write SSH pubkey to temp file
  ansible.builtin.copy:
    content: "{{ cryovial_ssh_pubkey }}"
    dest: /tmp/exophial_authorized_keys
    mode: "0600"

- name: Create SSH authorized_keys secret
  ansible.builtin.command: >
    kubectl create secret generic cryovial-ssh-keys
    --namespace laconic-cryovial
    --from-file=authorized_keys=/tmp/exophial_authorized_keys
    --dry-run=client -o yaml
  register: cryovial_ssh_secret_yaml
  changed_when: false

- name: Remove temp pubkey file
  ansible.builtin.file:
    path: /tmp/exophial_authorized_keys
    state: absent

- name: Apply SSH authorized_keys secret
  ansible.builtin.command: "kubectl apply -f -"
  args:
    stdin: "{{ cryovial_ssh_secret_yaml.stdout }}"
  register: cryovial_secret_result
  changed_when: "'created' in cryovial_secret_result.stdout or 'configured' in cryovial_secret_result.stdout"

- name: Create ConfigMap from config.env
  ansible.builtin.command: >
    kubectl create configmap cryovial-config
    --namespace laconic-cryovial
    --from-env-file={{ cryovial_stack_dir }}/deployment/config.env
    --dry-run=client -o yaml
  register: cryovial_configmap_yaml
  changed_when: false

- name: Apply ConfigMap
  ansible.builtin.command: "kubectl apply -f -"
  args:
    stdin: "{{ cryovial_configmap_yaml.stdout }}"
  register: cryovial_cm_result
  changed_when: "'created' in cryovial_cm_result.stdout or 'configured' in cryovial_cm_result.stdout"

- name: Apply deployment spec
  ansible.builtin.command: "kubectl apply -f {{ cryovial_stack_dir }}/deployment/spec.yml"
  register: cryovial_deploy_result
  changed_when: "'created' in cryovial_deploy_result.stdout or 'configured' in cryovial_deploy_result.stdout"

- name: Wait for cryovial pod to be ready
  ansible.builtin.command: >
    kubectl wait --for=condition=ready pod
    -l app=cryovial
    --namespace laconic-cryovial
    --timeout=120s
  register: cryovial_wait_result
  changed_when: false

- name: Verify cryovial is running
  ansible.builtin.command: "kubectl get pods -n laconic-cryovial -l app=cryovial -o wide"
  register: cryovial_pod_status
  changed_when: false

- name: Show cryovial pod status
  ansible.builtin.debug:
    msg: "{{ cryovial_pod_status.stdout }}"
