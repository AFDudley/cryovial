# Compose definition for the cryovial container.
#
# All processes run in a single container:
#   - sshd (key-based auth only)
#   - coord.git bare repo (initialized by entrypoint)
#   - exophial-cluster MCP server
#   - image-watcher

services:
  cryovial:
    image: laconic/cryovial:local
    build:
      context: ../..
      dockerfile: stacks/cryovial/Dockerfile
    restart: unless-stopped
    env_file:
      - deployment/config.env
    ports:
      - "2222:22"
    volumes:
      - coord-data:/home/exophial/coord.git
      - ssh-keys:/home/exophial/.ssh
    healthcheck:
      test: ["CMD", "pgrep", "-f", "sshd"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  coord-data:
    driver: local
  ssh-keys:
    driver: local
